
<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Collection - كوليكشن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'slide-up': 'slideUp 0.4s ease-out forwards',
              'slide-down': 'slideDown 0.4s ease-out forwards',
              'bounce-in': 'bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards',
              'marquee': 'marquee 20s linear infinite',
              'marquee-fast': 'marquee 10s linear infinite',
              'bounce-horizontal': 'bounceHorizontal 2s ease-in-out infinite',
              'bounce-subtle': 'bounceSubtle 3s ease-in-out infinite',
            },
            keyframes: {
              bounceSubtle: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-5px)' },
              },
              bounceHorizontal: {
                '0%, 100%': { transform: 'translateX(0)' },
                '50%': { transform: 'translateX(-10px)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              slideDown: {
                '0%': { transform: 'translate(-50%, -20px)', opacity: '0' },
                '100%': { transform: 'translate(-50%, 0)', opacity: '1' },
              },
              bounceIn: {
                '0%': { transform: 'scale(0.3)', opacity: '0' },
                '50%': { transform: 'scale(1.05)', opacity: '1' },
                '70%': { transform: 'scale(0.9)' },
                '100%': { transform: 'scale(1)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --primary-navy: #1a2b4c;
        --secondary-beige: #f5f1e8;
        --light-beige: #f9f7f2;
        --accent-gold: #c4a76d;
        --light-gray: #e0e0e0;
        --text-gray: #7a7a7a;
      }
      * {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }
      body {
        font-family: 'Tajawal', sans-serif;
        -webkit-text-size-adjust: 100%;
        line-height: 1.6;
        overflow-x: hidden;
        background-color: var(--secondary-beige);
        color: var(--primary-navy);
      }
      [dir="rtl"] {
        font-family: 'Tajawal', sans-serif;
      }
      /* تحسين استجابة النصوص للهواتف الصغيرة جداً */
      @media (max-width: 380px) {
        .hero-title { font-size: 2rem !important; }
        .nav-text { font-size: 10px !important; }
      }
      @media (max-width: 640px) {
        h1, h2, h3, h4 {
          line-height: 1.3 !important;
          margin-bottom: 0.5rem !important;
        }
      }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      [dir="rtl"] .animate-marquee {
        animation: marquee-rtl 20s linear infinite;
      }
      [dir="rtl"] .animate-marquee-fast {
        animation: marquee-rtl 10s linear infinite;
      }
      @keyframes marquee-rtl {
        0% { transform: translateX(0); }
        100% { transform: translateX(50%); }
      }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #c4a76d; border-radius: 10px; }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
</head>
  <body class="bg-[#f5f1e8] text-[#1a2b4c] dark:bg-[#020617] dark:text-slate-100 transition-colors duration-500 selection:bg-[#c4a76d] selection:text-white">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
